version: '3.8'

services:
  dashboard:
    build: .
    container_name: gitpulse-ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: always

  pipeline:
    build: .
    container_name: gitpulse-engine
    volumes:
      - ./data:/app/data 
    env_file: .env
    command: python main.py
    profiles:
      - worker